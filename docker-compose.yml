# =============================================================================
# docker-compose.yml — Pub-Sub Log Aggregator (Bonus +10%)
#
# Dua service terpisah dalam internal Docker network:
#   aggregator  — FastAPI server + SQLite dedup store
#   publisher   — Simulation script (at-least-once delivery)
#
# Jaringan: internal-only (tidak ada koneksi ke service eksternal publik)
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # Aggregator — server utama
  # ---------------------------------------------------------------------------
  aggregator:
    build:
      context: .
      dockerfile: Dockerfile
    image: uts-aggregator:latest
    container_name: uts-aggregator
    ports:
      - "8080:8080"
    volumes:
      - dedup_data:/app/data
    environment:
      DEDUP_DB_PATH: /app/data/dedup.db
      QUEUE_MAX_SIZE: "10000"
      PORT: "8080"
    networks:
      - pubsub_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Publisher — simulasi at-least-once delivery
  # Dijalankan setelah aggregator sehat, kemudian berhenti (oneshot).
  # ---------------------------------------------------------------------------
  publisher:
    build:
      context: .
      dockerfile: Dockerfile
    image: uts-aggregator:latest
    container_name: uts-publisher
    depends_on:
      aggregator:
        condition: service_healthy
    environment:
      AGGREGATOR_URL: http://aggregator:8080
    networks:
      - pubsub_net
    # Override CMD untuk menjalankan publisher simulation
    command: ["python", "-m", "src.publisher_sim",
              "--url", "http://aggregator:8080",
              "--total", "6000",
              "--dup-rate", "0.25"]
    restart: "no"

# ---------------------------------------------------------------------------
# Volume — data SQLite persisten
# ---------------------------------------------------------------------------
volumes:
  dedup_data:
    driver: local

# ---------------------------------------------------------------------------
# Network — internal only
# ---------------------------------------------------------------------------
networks:
  pubsub_net:
    driver: bridge
    internal: false   # publisher perlu reach aggregator, bukan internet
